name: NPU SDXL Conversion via Kaggle

concurrency:
  group: sdxl-convert-kaggle-${{ inputs.model_name || 'scheduled-watch' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      pipeline_action:
        description: "start pushes the next Kaggle notebook; watch checks current Kaggle state and advances if ready"
        required: true
        default: "start"
        type: choice
        options: ["start", "watch"]
      civitai_version_id:
        description: "Civitai modelVersionId (SDXL model)"
        required: true
        default: "2883731"
        type: string
      model_name:
        description: "Output zip prefix + slug segment"
        required: true
        default: "customxl"
        type: string
      realistic:
        description: "Realistic calibration prompts"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      min_soc:
        description: "Target Snapdragon SoC"
        required: true
        default: "8gen3"
        type: choice
        options: ["8gen3", "8gen4"]
      runtime_mode:
        description: "Kaggle runtime for B1/B2 conversion stages"
        required: true
        default: "cpu"
        type: choice
        options: ["cpu", "tpu"]
      skip_phase1:
        description: "Skip Phase 1 GPU kernel and reuse an existing Phase 1 output"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      phase1_slug:
        description: "Existing Phase 1 kernel slug or owner/slug when skip_phase1=true"
        required: false
        default: ""
        type: string
  schedule:
    # Short self-wake watcher. GitHub may delay/drop scheduled events, so every run is idempotent.
    - cron: "*/30 * * * *"

jobs:
  kaggle-state-machine:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: |
          pip install --quiet kaggle

      - name: Configure Kaggle API
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          if [ -z "$KAGGLE_JSON" ]; then
            echo "::error ::KAGGLE_JSON secret is missing"
            exit 1
          fi
          mkdir -p ~/.kaggle
          printf '%s' "$KAGGLE_JSON" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          KAGGLE_USERNAME=$(python -c "import json; print(json.load(open('$HOME/.kaggle/kaggle.json'))['username'])")
          echo "::add-mask::$KAGGLE_USERNAME"
          echo "KAGGLE_USERNAME=$KAGGLE_USERNAME" >> "$GITHUB_ENV"
          kaggle --version

      - name: Regenerate B1/B2 notebooks from shared source
        run: |
          python kaggle/common/make_phase_notebooks.py

      - name: Run Kaggle pipeline state machine
        env:
          PIPELINE_ACTION: ${{ github.event_name == 'schedule' && 'watch' || inputs.pipeline_action }}
          CIVITAI_VERSION_ID: ${{ inputs.civitai_version_id || vars.SDXL_CIVITAI_VERSION_ID || '2883731' }}
          MODEL_NAME: ${{ inputs.model_name || vars.SDXL_MODEL_NAME || 'customxl' }}
          REALISTIC: ${{ inputs.realistic || vars.SDXL_REALISTIC || 'false' }}
          MIN_SOC: ${{ inputs.min_soc || vars.SDXL_MIN_SOC || '8gen3' }}
          RUNTIME_MODE: ${{ inputs.runtime_mode || vars.SDXL_RUNTIME_MODE || 'cpu' }}
          SKIP_PHASE1: ${{ inputs.skip_phase1 || vars.SDXL_SKIP_PHASE1 || 'false' }}
          PHASE1_SLUG: ${{ inputs.phase1_slug || vars.SDXL_PHASE1_SLUG || '' }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
        run: |
          python kaggle/tools/orchestrate_kaggle.py

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdxl-kaggle-diagnostics-${{ github.run_id }}
          path: |
            output/
            .kaggle_work/
          if-no-files-found: ignore
