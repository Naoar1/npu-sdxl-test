name: NPU SDXL Conversion via Kaggle

concurrency:
  # Per-model group: different model_name runs can go in parallel.
  # Same model_name will still cancel-in-progress to avoid duplicate TPU quota burn.
  group: sdxl-convert-kaggle-${{ inputs.model_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      civitai_version_id:
        description: "Civitai modelVersionId (SDXL model)"
        required: true
        default: "1408658"
        type: string
      model_name:
        description: "Output zip prefix + naming slug segment (alphanumeric + dashes only)"
        required: true
        default: "customxl"
        type: string
      realistic:
        description: "Realistic calibration prompts (SDXL Base / photoreal)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      min_soc:
        description: "Target Snapdragon SoC. Upstream convertsdxl.zip currently ships 8gen3 config only (as of 2026-04-20)."
        required: true
        default: "8gen3"
        type: choice
        options: ["8gen3", "8gen4"]
      burn_tpu:
        description: "Run TPU heartbeat (continuous tiny CNN training in main kernel thread). Required for B2 (>2h); optional for B1 (~1h48m)."
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      skip_phase1:
        description: "Skip Phase 1 GPU kernel (reuse existing A kernel)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      phase1_slug:
        description: "Phase 1 kernel slug (ONLY when skip_phase1=true; leave blank otherwise)"
        required: false
        default: ""
        type: string
      skip_b1:
        description: "Skip B1 (CLIP+VAE+UNet-converter); only run B2. Requires b1_slug."
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      b1_slug:
        description: "B1 kernel slug (ONLY when skip_b1=true). e.g. sdxl-convert-b1-tpu-customxl-20260421-120000"
        required: false
        default: ""
        type: string

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    # GHA free tier hard caps at 360 min. One run = either (A+B1) or (B2 alone), not all three.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install kaggle CLI
        run: |
          pip install --quiet kaggle

      - name: Configure Kaggle API
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          if [ -z "$KAGGLE_JSON" ]; then
            echo "::error ::KAGGLE_JSON secret is missing"
            exit 1
          fi
          mkdir -p ~/.kaggle
          printf '%s' "$KAGGLE_JSON" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          KAGGLE_USERNAME=$(python -c "import json; print(json.load(open('$HOME/.kaggle/kaggle.json'))['username'])")
          echo "::add-mask::$KAGGLE_USERNAME"
          echo "KAGGLE_USERNAME=$KAGGLE_USERNAME" >> $GITHUB_ENV
          kaggle --version

      - name: Compute kernel slugs (A / B1 / B2) with model_name + timestamp
        run: |
          set -e
          NAME=$(echo "${{ inputs.model_name }}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | sed 's/-\+/-/g; s/^-\|-$//g')
          if [ -z "$NAME" ]; then echo "::error ::model_name sanitized to empty"; exit 1; fi
          TS=$(date -u +%Y%m%d-%H%M%S)

          # A slug
          if [ "${{ inputs.skip_phase1 }}" = "true" ]; then
            if [ -z "${{ inputs.phase1_slug }}" ]; then
              echo "::error ::skip_phase1=true requires phase1_slug input"; exit 1
            fi
            SLUG_A="${{ inputs.phase1_slug }}"
            STAT=$(kaggle kernels status "$KAGGLE_USERNAME/$SLUG_A" 2>&1 || true)
            echo "$STAT"
            if ! echo "$STAT" | grep -qi 'complete'; then
              echo "::error ::phase1_slug not complete: $SLUG_A"; exit 1
            fi
          else
            SLUG_A="sdxl-convert-phase1-gpu-${NAME}-${TS}"
          fi

          # B1 slug
          if [ "${{ inputs.skip_b1 }}" = "true" ]; then
            if [ -z "${{ inputs.b1_slug }}" ]; then
              echo "::error ::skip_b1=true requires b1_slug input"; exit 1
            fi
            SLUG_B1="${{ inputs.b1_slug }}"
            STAT=$(kaggle kernels status "$KAGGLE_USERNAME/$SLUG_B1" 2>&1 || true)
            echo "$STAT"
            if ! echo "$STAT" | grep -qi 'complete'; then
              echo "::error ::b1_slug not complete: $SLUG_B1"; exit 1
            fi
          else
            SLUG_B1="sdxl-convert-b1-tpu-${NAME}-${TS}"
          fi

          # B2 slug (always fresh unless we add skip_b2 later)
          SLUG_B2="sdxl-convert-b2-tpu-${NAME}-${TS}"

          echo "SLUG_A=$SLUG_A"   | tee -a $GITHUB_ENV
          echo "SLUG_B1=$SLUG_B1" | tee -a $GITHUB_ENV
          echo "SLUG_B2=$SLUG_B2" | tee -a $GITHUB_ENV
          echo "TITLE_A=$SLUG_A"   | tee -a $GITHUB_ENV
          echo "TITLE_B1=$SLUG_B1" | tee -a $GITHUB_ENV
          echo "TITLE_B2=$SLUG_B2" | tee -a $GITHUB_ENV

      # ========== A (Phase 1) ==========
      - name: Patch notebook A
        if: inputs.skip_phase1 == 'false'
        env:
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
        run: |
          if [ -z "$CIVITAI_API_KEY" ]; then echo "::error ::CIVITAI_API_KEY missing"; exit 1; fi
          cd kaggle/notebook_a_gpu
          sed -i "s|{USERNAME}|$KAGGLE_USERNAME|g; s|{SLUG_A}|$SLUG_A|g; s|{TITLE_A}|$TITLE_A|g" kernel-metadata.json
          python <<'PYEOF'
          import json, os
          nb = json.load(open('notebook.ipynb'))
          subs = {
              '__CIVITAI_VERSION_ID__': '${{ inputs.civitai_version_id }}',
              '__MODEL_NAME__':         '${{ inputs.model_name }}',
              '__REALISTIC__':          '${{ inputs.realistic }}',
              '__CIVITAI_API_KEY__':    os.environ['CIVITAI_API_KEY'],
          }
          for c in nb['cells']:
              if c['cell_type'] != 'code': continue
              src = ''.join(c['source']) if isinstance(c['source'], list) else c['source']
              for k, v in subs.items(): src = src.replace(k, v)
              c['source'] = src.splitlines(keepends=True)
          json.dump(nb, open('notebook.ipynb','w'), indent=1, ensure_ascii=False)
          PYEOF

      - name: Push notebook A (Phase 1)
        if: inputs.skip_phase1 == 'false'
        run: |
          cd kaggle/notebook_a_gpu && kaggle kernels push -p . --accelerator NvidiaTeslaT4

      - name: Poll notebook A
        if: inputs.skip_phase1 == 'false'
        timeout-minutes: 60
        run: |
          for i in $(seq 1 120); do
            sleep 30
            OUT=$(kaggle kernels status $KAGGLE_USERNAME/$SLUG_A 2>&1 || true)
            echo "[A $i/120] $OUT"
            S=$(echo "$OUT" | grep -oiE '(complete|running|error|cancel_acknowledged|cancel_requested|queued|new_script)' | head -1 | tr '[:upper:]' '[:lower:]')
            case "$S" in
              complete) echo "A done"; exit 0 ;;
              error|cancel_acknowledged|cancel_requested)
                mkdir -p /tmp/a_out && kaggle kernels output $KAGGLE_USERNAME/$SLUG_A -p /tmp/a_out || true
                echo "A failed"; exit 1 ;;
            esac
          done
          echo "A timeout"; exit 1

      # ========== B1 (CLIP + VAE + UNet converter, ~2h) ==========
      - name: Patch notebook B1
        if: inputs.skip_b1 == 'false'
        run: |
          cd kaggle/notebook_b1_tpu
          sed -i "s|{USERNAME}|$KAGGLE_USERNAME|g; s|{SLUG_A}|$SLUG_A|g; s|{SLUG_B1}|$SLUG_B1|g; s|{TITLE_B1}|$TITLE_B1|g" kernel-metadata.json
          python <<'PYEOF'
          import json
          nb = json.load(open('notebook.ipynb'))
          subs = {
              '__CIVITAI_VERSION_ID__': '${{ inputs.civitai_version_id }}',
              '__MODEL_NAME__':         '${{ inputs.model_name }}',
              '__REALISTIC__':          '${{ inputs.realistic }}',
              '__MIN_SOC__':            '${{ inputs.min_soc }}',
              '__BURN_TPU__':           '${{ inputs.burn_tpu }}',
          }
          for c in nb['cells']:
              if c['cell_type'] != 'code': continue
              src = ''.join(c['source']) if isinstance(c['source'], list) else c['source']
              for k, v in subs.items(): src = src.replace(k, v)
              c['source'] = src.splitlines(keepends=True)
          json.dump(nb, open('notebook.ipynb','w'), indent=1, ensure_ascii=False)
          PYEOF

      - name: Push notebook B1 (Phase 2-4a on TPU)
        if: inputs.skip_b1 == 'false'
        run: |
          cd kaggle/notebook_b1_tpu && kaggle kernels push -p .

      - name: Poll notebook B1
        if: inputs.skip_b1 == 'false'
        # B1 empirical upper bound: ~2h (1h48m + margin). 145 min gives ~22 min headroom.
        timeout-minutes: 145
        run: |
          for i in $(seq 1 290); do
            sleep 30
            OUT=$(kaggle kernels status $KAGGLE_USERNAME/$SLUG_B1 2>&1 || true)
            echo "[B1 $i/290] $OUT"
            S=$(echo "$OUT" | grep -oiE '(complete|running|error|cancel_acknowledged|cancel_requested|queued|new_script)' | head -1 | tr '[:upper:]' '[:lower:]')
            case "$S" in
              complete) echo "B1 done"; exit 0 ;;
              error|cancel_acknowledged|cancel_requested)
                mkdir -p /tmp/b1_out && kaggle kernels output $KAGGLE_USERNAME/$SLUG_B1 -p /tmp/b1_out || true
                echo "B1 failed"; exit 1 ;;
            esac
          done
          echo "B1 timeout"; exit 1

      # ========== B2 (UNet quantizer + context-bin + package, ~5h) ==========
      # NOTE: B2's full ~5h compute + setup may exceed GHA's 360min job cap when combined with A+B1.
      # Recommended usage: run once with skip_b1=false (A+B1), then second workflow run with
      # skip_phase1=true skip_b1=true and both slugs to execute ONLY B2 within its own GHA budget.
      - name: Patch notebook B2
        run: |
          cd kaggle/notebook_b2_tpu
          sed -i "s|{USERNAME}|$KAGGLE_USERNAME|g; s|{SLUG_B1}|$SLUG_B1|g; s|{SLUG_B2}|$SLUG_B2|g; s|{TITLE_B2}|$TITLE_B2|g" kernel-metadata.json
          python <<'PYEOF'
          import json
          nb = json.load(open('notebook.ipynb'))
          subs = {
              '__CIVITAI_VERSION_ID__': '${{ inputs.civitai_version_id }}',
              '__MODEL_NAME__':         '${{ inputs.model_name }}',
              '__REALISTIC__':          '${{ inputs.realistic }}',
              '__MIN_SOC__':            '${{ inputs.min_soc }}',
              '__BURN_TPU__':           '${{ inputs.burn_tpu }}',
          }
          for c in nb['cells']:
              if c['cell_type'] != 'code': continue
              src = ''.join(c['source']) if isinstance(c['source'], list) else c['source']
              for k, v in subs.items(): src = src.replace(k, v)
              c['source'] = src.splitlines(keepends=True)
          json.dump(nb, open('notebook.ipynb','w'), indent=1, ensure_ascii=False)
          PYEOF

      - name: Push notebook B2 (UNet quantizer + context-bin + package)
        run: |
          cd kaggle/notebook_b2_tpu && kaggle kernels push -p .

      - name: Poll notebook B2
        # GHA job-wide cap is 360min. When running A+B1+B2 in one trigger, B2 polling budget is
        # limited by remaining time. Polling may time out while Kaggle kernel continues.
        timeout-minutes: 340
        run: |
          for i in $(seq 1 680); do
            sleep 30
            OUT=$(kaggle kernels status $KAGGLE_USERNAME/$SLUG_B2 2>&1 || true)
            echo "[B2 $i/680] $OUT"
            S=$(echo "$OUT" | grep -oiE '(complete|running|error|cancel_acknowledged|cancel_requested|queued|new_script)' | head -1 | tr '[:upper:]' '[:lower:]')
            case "$S" in
              complete) echo "B2 done"; exit 0 ;;
              error|cancel_acknowledged|cancel_requested)
                mkdir -p /tmp/b2_out && kaggle kernels output $KAGGLE_USERNAME/$SLUG_B2 -p /tmp/b2_out || true
                echo "B2 failed"; exit 1 ;;
            esac
          done
          echo "B2 timeout"; exit 1

      - name: Download notebook B2 output (final zip)
        if: always()
        run: |
          mkdir -p output
          kaggle kernels output $KAGGLE_USERNAME/$SLUG_B2 -p output/ || true
          ls -la output/

      - name: Upload GH artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdxl-output-${{ inputs.model_name }}-${{ github.run_id }}
          path: output/
          if-no-files-found: warn
